name: CD-Dev

on:
  workflow_call:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy fe via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.TG_DEV_SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.TG_DEV_SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/app/scripts/
            ./fe-deploy.sh